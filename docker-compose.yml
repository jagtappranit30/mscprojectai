version: '3.8'

services:
  vantly-app:
    container_name: vantly-app
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501" # Streamlit UI port
      - "8000:8000" # FastAPI Backend port
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Persist FastEmbed models to avoid downloading on every container rebuild
      - fastembed_cache:/app/fastembed_cache
    restart: always

volumes:
  fastembed_cache:
