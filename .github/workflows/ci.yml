name: "CI — Test & Lint"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Lint & Static Analysis
  # ────────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check backend/ frontend/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format backend/ frontend/ tests/ --check

  # ────────────────────────────────────────────────
  # Job 2: Security Scan
  # ────────────────────────────────────────────────
  security:
    name: "Security (bandit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r backend/ -ll -iii --exit-zero

  # ────────────────────────────────────────────────
  # Job 3: Test Suite with Coverage
  # ────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [lint]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install pytest-cov

      - name: Run test suite with coverage
        env:
          GROQ_API_KEY: "placeholder"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "placeholder"
          SUPABASE_JWT_SECRET: "placeholder"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 7

      - name: Post coverage summary to PR
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: test-results.xml
