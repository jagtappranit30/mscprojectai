name: "CD — Deploy on Merge to Main"

on:
  push:
    branches: ["main"]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Gate — tests must pass before any deploy
  # ────────────────────────────────────────────────
  test:
    name: "Test Gate (Python 3.12)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run full test suite
        env:
          GROQ_API_KEY: "placeholder"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "placeholder"
          SUPABASE_JWT_SECRET: "placeholder"
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  # ────────────────────────────────────────────────
  # Job 2: Deploy backend to Render
  # ────────────────────────────────────────────────
  deploy-backend:
    name: "Deploy Backend → Render"
    runs-on: ubuntu-latest
    needs: [test]
    environment: production

    steps:
      - name: Trigger Render deploy via webhook
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request POST \
            "https://api.render.com/deploy/svc/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}")

          echo "Render webhook response: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ Render deploy trigger failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Render deploy triggered successfully"

      - name: Wait for Render to become healthy
        # Poll the /health endpoint until it responds 200 or we time out (5 min)
        env:
          RENDER_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Waiting for backend to become healthy at $RENDER_URL/health ..."
          for i in $(seq 1 30); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 "$RENDER_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Backend did not become healthy within 5 minutes"
          exit 1

  # ────────────────────────────────────────────────
  # Job 3: Notify Streamlit Cloud to redeploy
  # (Streamlit Cloud auto-deploys on git push — this
  #  job just confirms frontend is reachable after deploy)
  # ────────────────────────────────────────────────
  verify-frontend:
    name: "Verify Frontend → Streamlit Cloud"
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    steps:
      - name: Check Streamlit Cloud app is reachable
        env:
          STREAMLIT_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          echo "Checking Streamlit app at $STREAMLIT_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 15 "$STREAMLIT_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Streamlit frontend is live!"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️  Streamlit app did not respond within 3 minutes (may still be rebooting)"
          exit 0   # non-fatal — Streamlit Cloud redeploys asynchronously

  # ────────────────────────────────────────────────
  # Job 4: Post deployment summary
  # ────────────────────────────────────────────────
  notify:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [deploy-backend, verify-frontend]
    if: always()

    steps:
      - name: Summarise deployment
        env:
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.verify-frontend.result }}
          RENDER_URL: ${{ secrets.RENDER_BACKEND_URL }}
          STREAMLIT_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Render) | $BACKEND_RESULT | $RENDER_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Streamlit) | $FRONTEND_RESULT | $STREAMLIT_URL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
